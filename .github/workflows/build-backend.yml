name: Build Secure Backend

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Change this if your VPS runs a different version, but standalone binaries usually include their own interpreter

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --name backend-server --onefile \
          --hidden-import="uvicorn.logging" \
          --hidden-import="uvicorn.loops" \
          --hidden-import="uvicorn.loops.auto" \
          --hidden-import="uvicorn.protocols" \
          --hidden-import="uvicorn.protocols.http" \
          --hidden-import="uvicorn.protocols.http.auto" \
          --hidden-import="uvicorn.protocols.websockets" \
          --hidden-import="uvicorn.protocols.websockets.auto" \
          --hidden-import="uvicorn.lifespan" \
          --hidden-import="uvicorn.lifespan.on" \
          --hidden-import="sqlalchemy.sql.default_comparator" \
          --hidden-import="sqlalchemy.ext.asyncio" \
          --hidden-import="passlib.handlers.bcrypt" \
          --hidden-import="email_validator" \
          --hidden-import="pydantic" \
          run.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: secure-backend-binary
        path: dist/backend-server
