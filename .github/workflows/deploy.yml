name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    concurrency: production_deploy

    steps:
      - name: 🛡️ Configure Git Safe Directory
        run: |
          git config --global --add safe.directory /var/www/myproject/background-api
          echo "Safe directory configured."

      - name: 🔄 Fetch and Reset Code
        working-directory: /var/www/myproject/background-api
        run: |
          set -e
          git fetch origin main
          git reset --hard origin/main
          echo "Code updated to: $(git log -1 --oneline)"

      - name: 🔍 Debug Environment
        working-directory: /var/www/myproject/background-api
        run: |
          echo "=== Environment Info ==="
          echo "Working dir: $(pwd)"
          echo "Python3: $(python3 --version)"
          echo "GCC: $(gcc --version | head -1)"
          echo "Venv exists: $(test -d /var/www/myproject/venv && echo YES || echo NO)"
          echo "Files in app/:"
          ls app/ | head -20

      - name: 🐍 Ensure Virtual Environment Exists
        run: |
          if [ ! -d "/var/www/myproject/venv" ]; then
            echo "Creating new virtual environment..."
            python3 -m venv /var/www/myproject/venv
            echo "Venv created."
          else
            echo "Venv already exists."
          fi

      - name: 📦 Install Python Dependencies
        working-directory: /var/www/myproject/background-api
        run: |
          set -e
          source /var/www/myproject/venv/bin/activate
          echo "Python: $(which python) — $(python --version)"
          pip install --upgrade pip -q
          pip install -r requirements.txt -q
          pip install cython setuptools -q
          echo "All dependencies installed ✅"

      - name: 🔒 Compile with Cython (Hide Source Code)
        working-directory: /var/www/myproject/background-api
        run: |
          set -e
          source /var/www/myproject/venv/bin/activate
          echo "Starting Cython compilation..."
          python setup_cython.py build_ext --inplace
          echo "Compilation complete ✅"
          echo "Binaries created: $(find app/ -name '*.so' | wc -l)"

      - name: 🧹 Remove Python Source Files
        working-directory: /var/www/myproject/background-api
        run: |
          set -e
          find app/ -name "*.py" \
            ! -name "__init__.py" \
            ! -name "database.py" \
            -delete
          rm -rf build/
          find app/ -name "*.c" -delete
          echo "Source files removed ✅"
          echo "Remaining .so binaries: $(find app/ -name '*.so' | wc -l)"

      - name: 🚀 Restart Systemd Service
        run: |
          set -e
          sudo systemctl restart background-api.service
          echo "Service restarted ✅"

      - name: ✅ Verify Service Status
        run: |
          sleep 3
          sudo systemctl status background-api.service

