services:
  - type: web
    name: background-verification-api
    runtime: python
    rootDirectory: .
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: REDIS_URL
        sync: false
